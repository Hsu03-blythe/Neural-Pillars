<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Anatomical Archive</title>
    <!-- To get desired font styles -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* I chose this color to look like an old parchment, which gives a vintage and scholarly feel to the website. It also provides a warm contrast against the dark background, making the text easier to read while maintaining the overall aesthetic of an ancient archive. */
        :root {
            --parchment: #e8dfd1;
            --ink-dark: #1a1510;
            --ink-red: #8b0000;
            --bg-deep: #0a0a0a;
        }

        body {
            margin: 0;
            background: var(--bg-deep);
            color: var(--parchment);
            font-family: 'EB Garamond', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header section */
        header {
            padding: 60px 20px 20px;
            text-align: center;
            border-bottom: 1px double var(--ink-red);
            margin-bottom: 40px;
            width: 80%;
        }

        .title-main {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2rem;
            font-style: italic;
            letter-spacing: 3px;
            margin: 0;
        }

        /* --- The Brain Visualization --- */
       
        .stage {
            position: relative; /* This is needed to position the data node absolutely within this container */
            width: 40vw;
            max-width: 600px;
            padding: 40px;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            border-radius: 50%;
            box-shadow: inset 0 0 100px #000;
        }

        svg { width: 100%; height: auto; overflow: visible; } /* this allows the SVG to scale responsively while maintaining its aspect ratio, and ensures that any parts of the brain that extend beyond the initial viewBox are still visible. */

        .brain-part {
            fill: var(--ink-dark);
            stroke: var(--parchment);
            stroke-width: 1;
            stroke-linejoin: round; 
            filter: drop-shadow(0 0 1px rgba(0,0,0,1));
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: help;
            opacity: 0.2; /* This is the ideal opacity or its will be overlapped */
            z-index: 100;
        }

        /* --- Interaction: The "Illumination" --- */
        .brain-part:hover {
            opacity: 1;
            fill: #1a1a1a;
            stroke: #ffffff; 
            stroke-width: 4;
            filter: 
                drop-shadow(0 0 2px #fff) 
                drop-shadow(0 0 15px var(--ink-red));
            
            transform: scale(1.005); /* Slightly enlarge the hovered part for emphasis */
            z-index: 1000;
        }

        
        #data-node {
            position: fixed;
            bottom: 50px;
            left: 30%;
            transform: translateX(-50%) translateY(20px); 
            width: 300px;
            max-width: 40vw;
            text-align: center;
            background: rgba(10, 10, 10, 0.98);
            border: 1px solid #3d3225;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            
            /* I added this because there were ghost text and cursor interaction issues when the node was hidden. This way, the node is still there but completely non-interactive and invisible until activated.   */
            opacity: 0;
            visibility: hidden; 
            pointer-events: none; 
            
            transition: 
                opacity 0.4s ease, 
                transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                visibility 0.4s;
        }

        #data-node.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .node-label {
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--ink-red);
            margin-bottom: 10px;
        }

        .node-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            margin-bottom: 10px;
            border-bottom: 1px solid #3d3225;
            display: inline-block;
            padding: 0 20px 5px;
        }

        .node-desc {
            font-size: 1rem;
            line-height: 1.6;
            color: #a89f8d;
            font-style: italic;
        }

        footer {
            width: 100%;
            margin: 60px auto 0;
            padding: 32px 0 18px 0;
            background: rgba(10, 10, 10, 0.7);
            color: var(--parchment);
            text-align: center;
            font-family: 'EB Garamond', serif;
            border-top: 1px solid rgba(139, 0, 0, 0.6);
            box-shadow: 0 -10px 50px rgba(0, 0, 0, 0.65);
        }
        .footer-links {
            margin-bottom: 10px;
        }
        .footer-links a {
            color: var(--parchment);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            margin: 0 10px;
            transition: color 0.2s;
            letter-spacing: 1px;
        }
        .footer-links a:hover {
            color: var(--ink-red);
            text-shadow: 0 0 6px #fff2;
        }
        .footer-sep {
            color: #a89f8d;
            font-size: 1.2rem;
            margin: 0 4px;
        }
        .footer-copy {
            font-size: 0.95rem;
            color: #a89f8d;
            margin: 0;
            letter-spacing: 1px;
        }
    </style>
</head>

    <script>
        const library = {
            frontal: { t: "Frontal lobe", d: "The executive center; regulating social conduct, complex logic, and the spirit of resolve." },
            parietal: { t: "Parietal lobe", d: "The navigator; integrating sensory information to map the body's place in the physical world." },
            temporal: { t: "Temporal lobe", d: "The archive of sound and memory; where language is deciphered and the past is preserved." },
            occipital: { t: "Occipital lobe", d: "The optical laboratory; processing the light of the world into the images of the mind." },
            cerebellum: { t: "Cerebellum", d: "The silent rhythmic master; coordinating balance, posture, and the grace of movement." },
            spinal: { t: "Spinal cord", d: "The vital bridge; controlling the automated breath and the beating of the heart." }
        }; 
        /* This library object holds the titles and descriptions for each brain region, which are displayed in the data node when the user hovers over the corresponding area in the SVG. */

        const node = document.getElementById('data-node');
        const nTitle = document.getElementById('node-title');
        const nInfo = document.getElementById('node-info');
        
        document.querySelectorAll('.brain-part').forEach(part => {
            part.addEventListener('mouseenter', () => {
                const entry = library[part.id];
                nTitle.innerText = entry.t;
                nInfo.innerText = entry.d;
                node.classList.add('active');
            });

            part.addEventListener('mouseleave', () => {
                node.classList.remove('active');
            });
        });
    </script>
